
[build-system]
requires = ["setuptools"]


# Package info and dependencies
[project]
name = "maf_three"
description = "Matter and Form - THREE - API"
dynamic = ["version"]
dependencies = [
    "requests",
    'importlib-metadata; python_version<"3.10"',
    "websocket-client == 1.7.0"
]

# URLs
[project.urls]
Homepage = "https://matterandform.net"
Documentation = "https://matterandform.net"

# Package source
[tool.setuptools.packages.find]
include = ["maf_three*"]

# Dynamic input
[tool.setuptools.dynamic]
version = {attr = "maf_three.__version__"}